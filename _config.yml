  gtm_id: GTM-PJSCRR2
  facebook_pixel_id: "476998489733035"
  rewardful_id: "0a69b2"
  intercom_app_id: nawne3lq

# ── Build ─────────────────────────────────────────────────────────────
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

sass:
  style: compressed

# Don't copy these into the built _site
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

# Pretty permalinks
permalink: pretty
