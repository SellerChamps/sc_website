  signin:  "https://app.sellerchamp.com/users/sign_in"
  signup:  "https://app.sellerchamp.com/users/sign_up?scenario=lister_trial"
  leads:   "https://app.sellerchamp.com/leads/new"

# Marketing / analytics (matches live sellerchamp.com)
