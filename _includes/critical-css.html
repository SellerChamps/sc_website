<style>
:root{--navy:#2d6cb6;--navy-dark:#245a9a;--navy-ink:#0f2742;--teal:#00cfa7;--teal-dark:#00ae92;--ink:#14202e;--body:#475467;--line-soft:#eef2f7;--bg:#fff;--bg-navy:#0f2742;--maxw:1180px;--display:"Montserrat",system-ui,-apple-system,"Segoe UI",sans-serif;--sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--sans);color:var(--body);background:var(--bg);line-height:1.6;font-size:17px;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{font-family:var(--display);color:var(--ink);margin:0;line-height:1.12;letter-spacing:-.02em}
.wrap{width:100%;max-width:var(--maxw);margin:0 auto;padding:0 24px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-weight:700;font-size:16px;padding:14px 26px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;white-space:nowrap}
.btn--primary{background:var(--teal);color:#03332a;box-shadow:0 6px 16px rgba(0,207,167,.35)}
.btn--ghost{background:transparent;color:var(--navy);border-color:#e4e9f0}
.btn--lg{padding:17px 32px;font-size:17px}
.topbar{background:var(--bg-navy);color:#cdd9e8;font-size:13.5px;text-align:center;padding:7px 16px}
.topbar a{color:#fff;font-weight:600}
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line-soft)}
.nav__inner{display:flex;align-items:center;gap:28px;height:70px}
.nav__logo{display:flex;align-items:center}
.nav__logo-img{height:36px;width:auto}
.nav__links{display:flex;gap:26px;margin-left:10px}
.nav__links a{font-weight:600;font-size:15px;color:var(--ink)}
.nav__cta{display:flex;align-items:center;gap:14px;margin-left:auto}
.nav__cta .login{font-weight:600;font-size:15px;color:var(--ink)}
.nav__toggle{display:none;background:none;border:0;font-size:26px;color:var(--ink);cursor:pointer;padding:4px 8px;line-height:1}
.hero{padding:64px 0 40px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dark) 100%);color:#fff}
.hero__grid{display:grid;grid-template-columns:1fr;gap:40px;align-items:center}
.hero__badge{display:inline-flex;align-items:center;background:transparent;color:#fff;border:1px solid rgba(255,255,255,.45);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border-radius:999px;margin-bottom:22px}
.hero h1{font-size:clamp(32px,4.2vw,52px);font-weight:900;color:#fff;line-height:1.08}
.hero__accent{color:var(--teal)}
.hero__sub{margin-top:22px;font-size:18px;color:rgba(255,255,255,.92);max-width:52ch;line-height:1.65}
.hero__sub strong{color:#fff;font-weight:700}
.hero__actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:28px}
.hero .btn--ghost{color:#fff;border-color:rgba(255,255,255,.45)}
.hero__assure{display:grid;grid-template-columns:1fr;gap:12px;margin-top:28px;color:rgba(255,255,255,.92);font-size:14.5px;font-weight:500}
.hero-illustration{display:block;width:100%;height:auto}
@media(min-width:1025px){.hero__grid{grid-template-columns:minmax(0,1fr) minmax(0,1.1fr);gap:48px}.hero__assure{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.nav__links{display:none}.nav__toggle{display:block}.nav__cta .login{display:none}.hero__actions .btn{flex:1 1 auto}}
</style>
