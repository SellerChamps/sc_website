{% if jekyll.environment == "production" and site.tracking %}
{% if site.tracking.gtm_id %}
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id={{ site.tracking.gtm_id }}"
height="0" width="0" style="display:none;visibility:hidden" title="Google Tag Manager"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
{% endif %}

{% if site.tracking.facebook_pixel_id %}
<script>
fbq('track', 'ViewContent', {
  value: 2,
  currency: 'USD',
});
</script>
{% endif %}

{% if site.tracking.intercom_app_id %}
<!-- Intercom -->
<script>
  window.intercomSettings = {
    app_id: "{{ site.tracking.intercom_app_id }}"
  };
</script>
<script>(function(){var w=window;var ic=w.Intercom;if(typeof ic==="function"){ic('reattach_activator');ic('update',w.intercomSettings);}else{var d=document;var i=function(){i.c(arguments);};i.q=[];i.c=function(args){i.q.push(args);};w.Intercom=i;var l=function(){var s=d.createElement('script');s.type='text/javascript';s.async=true;s.src='https://widget.intercom.io/widget/{{ site.tracking.intercom_app_id }}';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};if(document.readyState==='complete'){l();}else if(w.attachEvent){w.attachEvent('onload',l);}else{w.addEventListener('load',l,false);}}})();</script>
<!-- End Intercom -->
{% endif %}
{% endif %}
