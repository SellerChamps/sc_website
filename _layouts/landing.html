<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/favicon.png' | relative_url }}">

  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
  {% if page.canonical %}<link rel="canonical" href="{{ page.canonical }}">{% endif %}

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
  {% if page.canonical %}<meta property="og:url" content="{{ page.canonical }}">{% endif %}
  {% if page.image %}<meta property="og:image" content="{{ page.image | absolute_url }}">{% endif %}
  <meta name="twitter:card" content="summary_large_image">

  {% if page.lcp_preload %}
  <link rel="preload" as="image" type="image/webp" href="{{ page.lcp_preload | relative_url }}" fetchpriority="high">
  {% endif %}
  <link rel="preload" href="{{ '/assets/fonts/inter-latin.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="{{ '/assets/css/fonts.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/landing.css' | relative_url }}">

  {% include tracking-head.html %}

  {% seo title=false %}
</head>
<body>
  {% include tracking-body.html %}
  {{ content }}
  {% include tracking-deferred.html %}
  <script src="{{ '/assets/js/landing.js' | relative_url }}" defer></script>
</body>
</html>
